<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Смешнючее поздравление</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="main-wrapper">
        <div class="video-large-container" id="video-layer" aria-hidden="true">
            <iframe
                id="bg-video"
                title="Поздравительное видео"
                src=""
                frameborder="0"
                allow="autoplay; fullscreen; encrypted-media"
                allowfullscreen
            ></iframe>
        </div>

        <div class="overlay"></div>

        <main class="content" id="overlay-card">
            <h1>Срочно: ты официально крутышка!</h1>
            <p>Нажми кнопку и получи поздравление уровня: «мама, я в телевизоре».</p>
            <button id="play-btn" type="button">Жмякнуть для праздника</button>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
